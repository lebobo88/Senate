name: "Senate — Legal & Compliance (The Curia Crown)"
version: 1.0.0
deprecated_after: null
description: >
  Twelve-jurist legal wing: Papinian (crew lead), Gaius (contracts), Ulpian
  (regulatory), Angerona (privacy), Minerva (IP), Scaevola (M&A), Cicero
  (litigation), Cato (governance), Tribonian (citation verification), plus the
  consilium — Paulus (employment), Modestinus (tax), Janus (export controls).
  Deliberates under the Law of Citations; bound by the Twelve Tables; halts at
  the Tribune's Veto. Wired to the Senate source pack and the Hydra
  orchestrator.
source_pack: .
entrypoint: claude-skill
industries:
  - legal
  - compliance
  - governance
  - privacy
  - ip
  - regulatory

agents:
  # Curia heads
  - slug: general-counsel
    mythic: Papinian
    role: "General Counsel — Crew Lead"
    authority: gatekeeper
    model_tier: opus
    agent_file: .claude/agents/general-counsel.md

  - slug: contract-counsel
    mythic: Gaius
    role: "Contracts & Commercial Counsel"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/contract-counsel.md

  - slug: regulatory-counsel
    mythic: Ulpian
    role: "Regulatory & Compliance Counsel"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/regulatory-counsel.md

  - slug: privacy-counsel
    mythic: Angerona
    role: "Privacy & Data Protection Counsel"
    authority: gatekeeper
    model_tier: sonnet
    hitl_trigger: true
    notes: "HITL on cross-border transfer risk, DPIA-required processing, or breach scenarios."
    agent_file: .claude/agents/privacy-counsel.md

  - slug: ip-counsel
    mythic: Minerva
    role: "Intellectual Property Counsel"
    authority: gatekeeper
    model_tier: sonnet
    agent_file: .claude/agents/ip-counsel.md

  - slug: mna-counsel
    mythic: Scaevola
    role: "M&A & Transactions Counsel"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/mna-counsel.md

  - slug: litigation-counsel
    mythic: Cicero
    role: "Litigation & Disputes Counsel"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/litigation-counsel.md

  - slug: governance-counsel
    mythic: Cato
    role: "Corporate Governance & Board Counsel"
    authority: advisory
    model_tier: sonnet
    agent_file: .claude/agents/governance-counsel.md

  - slug: citation-verifier
    mythic: Tribonian
    role: "Legal Research & Citation Verifier"
    authority: gatekeeper
    model_tier: sonnet
    hitl_trigger: true
    notes: "HITL on any fabricated-authority finding (Table III breach)."
    agent_file: .claude/agents/citation-verifier.md

  # Consilium (junior counsel)
  - slug: employment-counsel
    mythic: Paulus
    parent: contract-counsel
    role: "Employment & Labor Counsel"
    authority: execute
    model_tier: sonnet
    agent_file: .claude/agents/employment-counsel.md

  - slug: tax-counsel
    mythic: Modestinus
    parent: mna-counsel
    role: "Tax Counsel (deal structures)"
    authority: advisory
    model_tier: sonnet
    agent_file: .claude/agents/tax-counsel.md

  - slug: export-controls
    mythic: Janus
    parent: regulatory-counsel
    role: "Export Controls & Sanctions Counsel"
    authority: gatekeeper
    model_tier: sonnet
    hitl_trigger: true
    notes: "HITL on any sanctions/export-control exposure."
    agent_file: .claude/agents/export-controls.md

tools:
  - name: eights-memory
    privilege: read+write
    notes: "Optional. Precedent recall/encode: domain='legal', scope 'team:senate'. Degrade gracefully when absent (AGENTS.md §6)."
  - name: senate-output
    privilege: write
    notes: "Counsel-work-product filing to output/<domain>/. Via senate.output.write when the Hydra shim is present; direct file write otherwise."

accepts:
  - HANDOFF
  - C_SUITE_DECISION_PACKET
  - PRD
  - CREATIVE_BRIEF

emits:
  - DECISION_RECORD
  - HITL_REQUEST

gates:
  - rubric_id: citation-integrity@1
    when: always
    hitl_required: true
  - rubric_id: aba-512-ethics@1
    when: always
    hitl_required: true
  - rubric_id: gdpr-art-25-privacy-by-design@1
    hitl_required: true
    when: "personal data in scope"
  - rubric_id: eu-ai-act-classification@1
    hitl_required: true
    when: "'ai' in constraints.industries or 'ai-platform' in constraints.industries"
  - rubric_id: open-source-license-compatibility@1
    when: "open-source components in scope"
  - rubric_id: compliance-coverage@1
    hitl_required: true
    when: "regulatory matters"

# Best-of-N deliberately disabled in v1: Hydra's best-of-N rubric selection has
# no legal branch yet (Phase-2 follow-up). The Law of Citations supplies
# multi-opinion judgment inside the squad instead.
best_of_n: 0

invoke:
  command_hint: "/senate"
  fallback_commands:
    - /contract-review
    - /privacy-assess
    - /legal-opinion
  output_dir: "output/{domain}/{topic}-{date}.md"
